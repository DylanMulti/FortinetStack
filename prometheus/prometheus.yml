global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: 'fortigate_snmp'
    static_configs:
      - targets: ['192.168.1.254']   # ← FortiGate LAN IP
    metrics_path: /snmp
    params:
      module: [fortigate]
      auth: [public_v2]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116

  - job_name: 'fortigate-logparser'
    static_configs:
      - targets: ['logparser:9200']
