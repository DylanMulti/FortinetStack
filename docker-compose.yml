networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

services:

  # ── Prometheus (SNMP metrics) ──────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/snmp.yml:/etc/prometheus/snmp.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks: [monitoring]

  # ── SNMP Exporter (polls FortiGate) ───────────────────────────
  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: unless-stopped
    volumes:
      - ./prometheus/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    ports:
      - "9116:9116"
    networks: [monitoring]

  # ── Loki (log storage) ────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    user: "10001:10001"
    command: -config.file=/etc/loki/config.yml -target=all
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - ./loki/data:/loki
    ports:
      - "3100:3100"
    networks: [monitoring]

  # ── Grafana Alloy (tails fortigate.log → Loki) ────────────────
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/log/fortigate.log:/var/log/fortigate.log:ro
    ports:
      - "12345:12345"
    networks: [monitoring]

  # ── Grafana (dashboards) ───────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on: [prometheus, loki]
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=changeme123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks: [monitoring]

  # ── Log Parser (per-device bandwidth metrics) ──────────────────
  logparser:
    build: ./logparser
    container_name: logparser
    restart: unless-stopped
    volumes:
      - /var/log/fortigate.log:/var/log/fortigate.log:ro
    ports:
      - "9200:9200"
    networks: [monitoring]
